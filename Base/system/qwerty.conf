# TheOS default QWERTY layout (Set 1 scancodes).
# Format:
#   normal       <scancode> <value>
#   shift        <scancode> <value>
#   altgr        <scancode> <value>
#   altgr_shift  <scancode> <value>

normal 0x02 1
shift  0x02 !
normal 0x03 2
shift  0x03 @
normal 0x04 3
shift  0x04 #
normal 0x05 4
shift  0x05 $
normal 0x06 5
shift  0x06 %
normal 0x07 6
shift  0x07 ^
normal 0x08 7
shift  0x08 &
normal 0x09 8
shift  0x09 *
normal 0x0A 9
shift  0x0A (
normal 0x0B 0
